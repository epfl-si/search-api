- name: Search API - Pull app image
  community.docker.docker_image:
    name: '{{ ghcr_registry }}/{{ app_name }}:{{ tag }}'
    source: pull

- name: Search API - Push app image
  community.docker.docker_image:
    name: '{{ ghcr_registry }}/{{ app_name }}:{{ tag }}'
    repository: '{{ quay_registry }}/{{ app_name }}:{{ tag }}'
    push: true
    source: local
